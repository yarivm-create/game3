<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>רמיקוב ELITE - גרסה מלאה</title>
    <style>
        body { background: #0a0e14; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        #overlay { position: fixed; inset: 0; background: #0a0e14; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { background: #00e5ff; color: black; border: none; padding: 15px 50px; font-size: 24px; cursor: pointer; font-weight: bold; border-radius: 50px; }
        
        #game-layout { display: none; flex-direction: column; height: 100vh; }
        #hud { height: 60px; background: #16213e; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid #00e5ff; }
        
        #table { flex-grow: 1; padding: 20px; display: flex; flex-wrap: wrap; gap: 15px; overflow-y: auto; background: #0f172a; align-content: flex-start; direction: ltr; }
        #player-hand { height: 140px; background: #16213e; display: flex; padding: 15px; border-top: 2px solid #00e5ff; position: relative; direction: ltr; }
        #hand-content { display: flex; gap: 6px; overflow-x: auto; width: 100%; }
        
        .turn-lock { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #f1c40f; z-index: 100; direction: rtl; }

        .tile { 
            width: 40px; height: 58px; background: #fffbe0; border: 2px solid #d4a373; border-radius: 5px; 
            color: black; display: flex; justify-content: center; align-items: center; 
            font-size: 20px; font-weight: 800; cursor: pointer; box-shadow: 2px 2px 4px rgba(0,0,0,0.4); flex-shrink: 0;
        }
        .joker { background: #f1c40f !important; color: #fff !important; }
        
        .set-box { border: 2px solid rgba(255,255,255,0.1); padding: 8px; display: flex; gap: 4px; border-radius: 6px; background: rgba(255,255,255,0.05); }
        .new-set-area { border: 2px dashed #00e5ff; min-width: 100px; padding: 5px; display: flex; gap: 4px; border-radius: 6px; position: relative; }

        #controls { background: #16213e; padding: 10px; display: flex; gap: 10px; justify-content: center; direction: rtl; }
        .btn { background: none; border: 1px solid #00e5ff; color: #00e5ff; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn.danger { border-color: #ff4757; color: #ff4757; }
        .btn.danger:hover { background: #ff4757; color: white; }
        .btn:disabled { opacity: 0.3; }
        #msg-bar { background: #ff4757; color: white; font-size: 14px; padding: 5px; display: none; position: fixed; top: 65px; width: 100%; z-index: 50; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color: #00e5ff;">רמיקוב PRO</h1>
    <button class="start-btn" onclick="initGame()">התחל משחק</button>
</div>

<div id="game-layout">
    <div id="hud">
        <div>קופה: <span id="pool-txt">0</span></div>
        <div id="timer" style="font-size: 24px; color: #00e5ff;">60</div>
        <div id="turn-txt" style="font-weight: bold;">תורך</div>
        <div>קלפי מחשב: <span id="comp-txt">0</span></div>
    </div>
    
    <div id="msg-bar"></div>
    <div id="table"></div>

    <div id="controls">
        <button class="btn" onclick="sortHand('value')">סדר מספרים</button>
        <button class="btn" onclick="sortHand('color')">סדר צבעים</button>
        <button class="btn danger" onclick="resetCurrentTurn()" id="resetBtn">נקה הכל ↩</button>
        <button class="btn" onclick="drawAndEnd()">דלג/משוך</button>
        <button class="btn" onclick="validateAndFinish()" id="finishBtn" style="border-color:#f1c40f; color:#f1c40f;">אשר מהלכים</button>
    </div>

    <div id="player-hand">
        <div id="lock" class="turn-lock">המחשב משחק... 💻</div>
        <div id="hand-content"></div>
    </div>
</div>

<script>
    let pool = [], playerHand = [], compHand = [], tableSets = [], currentTurnSets = [[]];
    let hasMadeFirstMove = false, currentTurn = 'player', timeLeft = 60, timerInterval;
    const colors = ['#ff4757', '#0a3d62', '#2ed573', '#ffa502'];

    function initGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('game-layout').style.display = 'flex';
        setupDeck();
        render();
        startTimer();
    }

    function setupDeck() {
        pool = [];
        let id = 0;
        for (let i = 0; i < 2; i++) {
            colors.forEach(c => {
                for (let v = 1; v <= 13; v++) pool.push({v, c, id: id++, j: false});
            });
        }
        pool.push({v: '☺', c: '#000', id: id++, j: true}, {v: '☺', c: '#000', id: id++, j: true});
        pool.sort(() => Math.random() - 0.5);
        playerHand = pool.splice(0, 14);
        compHand = pool.splice(0, 14);
    }

    function render() {
        const table = document.getElementById('table');
        table.innerHTML = '';
        
        // סדרות קבועות על השולחן
        tableSets.forEach(set => {
            const div = document.createElement('div');
            div.className = 'set-box';
            set.sort((a,b) => a.v - b.v).forEach(t => div.appendChild(createTile(t)));
            table.appendChild(div);
        });

        // סדרות שהשחקן מוריד עכשיו
        if (currentTurn === 'player') {
            currentTurnSets.forEach((set, sIdx) => {
                const div = document.createElement('div');
                div.className = 'new-set-area';
                set.sort((a,b) => a.v - b.v).forEach((t, tIdx) => {
                    const tileEl = createTile(t);
                    tileEl.onclick = () => { playerHand.push(set.splice(tIdx, 1)[0]); render(); };
                    div.appendChild(tileEl);
                });
                table.appendChild(div);
            });
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.textContent = "+ סדרה";
            btn.style.height = "40px";
            btn.onclick = () => { currentTurnSets.push([]); render(); };
            table.appendChild(btn);
        }

        const hand = document.getElementById('hand-content');
        hand.innerHTML = '';
        playerHand.forEach(t => {
            const el = createTile(t);
            el.onclick = () => {
                currentTurnSets[currentTurnSets.length-1].push(t);
                playerHand = playerHand.filter(x => x.id !== t.id);
                render();
            };
            hand.appendChild(el);
        });

        // עדכון כפתור הניקוי
        const hasTilesOnTable = currentTurnSets.some(s => s.length > 0);
        document.getElementById('resetBtn').disabled = !hasTilesOnTable || currentTurn !== 'player';

        document.getElementById('pool-txt').textContent = pool.length;
        document.getElementById('comp-txt').textContent = compHand.length;
        document.getElementById('lock').style.display = currentTurn === 'comp' ? 'flex' : 'none';
    }

    function resetCurrentTurn() {
        currentTurnSets.forEach(set => {
            playerHand.push(...set);
        });
        currentTurnSets = [[]];
        render();
    }

    function createTile(t) {
        const el = document.createElement('div');
        el.className = 'tile' + (t.j ? ' joker' : '');
        el.style.color = t.c;
        el.textContent = t.j ? '☺' : t.v;
        return el;
    }

    function validateAndFinish() {
        let setsToMove = currentTurnSets.filter(s => s.length > 0);
        if (setsToMove.length === 0) return;

        let totalSum = 0;
        for (let set of setsToMove) {
            if (set.length < 3) { showError("מינימום 3 אריחים לסדרה!"); return; }
            totalSum += set.reduce((s, t) => s + (t.j ? 10 : t.v), 0);
        }

        if (!hasMadeFirstMove && totalSum < 30) { showError("פתיחה ראשונה דורשת 30 נקודות!"); return; }

        hasMadeFirstMove = true;
        tableSets.push(...setsToMove);
        currentTurnSets = [[]];
        
        if (playerHand.length === 0) { alert("ניצחת! רמי!"); location.reload(); }
        else startCompTurn();
    }

    function startCompTurn() {
        currentTurn = 'comp';
        render();
        setTimeout(() => {
            // לוגיקת מחשב בסיסית (כמו קודם)
            let moved = false;
            let groups = {};
            compHand.forEach(t => { if(!t.j) { groups[t.v] = groups[t.v] || []; groups[t.v].push(t); } });
            for (let v in groups) {
                if (groups[v].length >= 3) {
                    let set = groups[v].splice(0, 3);
                    tableSets.push(set);
                    compHand = compHand.filter(t => !set.find(s => s.id === t.id));
                    moved = true; break;
                }
            }
            if (!moved && pool.length > 0) compHand.push(pool.pop());
            currentTurn = 'player';
            timeLeft = 60;
            render();
        }, 1500);
    }

    function drawAndEnd() {
        resetCurrentTurn();
        if (pool.length > 0) playerHand.push(pool.pop());
        startCompTurn();
    }

    function showError(msg) {
        const b = document.getElementById('msg-bar');
        b.textContent = msg; b.style.display = 'block';
        setTimeout(() => b.style.display = 'none', 3000);
    }

    function sortHand(mode) {
        if(mode === 'value') playerHand.sort((a,b) => (a.j?99:a.v) - (b.j?99:b.v) || a.c.localeCompare(b.c));
        else playerHand.sort((a,b) => a.c.localeCompare(b.c) || (a.j?99:a.v) - (b.j?99:b.v));
        render();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(currentTurn === 'player') {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                if(timeLeft <= 0) drawAndEnd();
            }
        }, 1000);
    }
</script>
</body>
</html>
